name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.26.x"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go test -mod=readonly ./...
      - run: go vet ./...
      - run: go build ./cmd/patronictl
      - run: go test -run '^$' -tags=integration ./test/integration
      - run: go run ./tools/machineschema -check
